<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Symmetry Pattern Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <!-- Safari Canvas ctx.filter polyfill to support blur/glow effects -->
    <script src="https://cdn.jsdelivr.net/npm/context-filter-polyfill/dist/index.min.js"></script>
  </head>
  <body>
    <aside id="controls">
      <div class="panel-head">
        <span class="panel-title">Symmetry Pattern</span>
        <div class="panel-actions">
          <button id="generateButton" class="btn-primary">Randomize</button>
          <button id="downloadButton" class="btn-icon" title="Export PNG">↓</button>
        </div>
      </div>

      <section class="group">
        <button class="group-head" type="button">
          <span>Canvas</span>
          <span class="chev"></span>
        </button>
        <div class="group-body">
          <div class="preset-row" id="canvasPresets">
            <button data-size="full" class="preset-btn">Full</button>
            <button data-size="1x1" class="preset-btn">1:1</button>
            <button data-size="9x16" class="preset-btn">9:16</button>
            <button data-size="4x5" class="preset-btn">4:5</button>
            <button data-size="16x9" class="preset-btn">16:9</button>
          </div>
          <div class="field">
            <div class="field-head"><label>Width</label><input data-key="canvasWidth" class="num-input" type="number" min="300" max="4000" step="1" /></div>
            <input data-key="canvasWidth" type="range" min="300" max="4000" step="1" />
          </div>
          <div class="field">
            <div class="field-head"><label>Height</label><input data-key="canvasHeight" class="num-input" type="number" min="300" max="4000" step="1" /></div>
            <input data-key="canvasHeight" type="range" min="300" max="4000" step="1" />
          </div>
          <div class="field">
            <div class="field-head"><label>Padding</label><span class="val" data-val="canvasPadding"></span></div>
            <input data-key="canvasPadding" type="range" min="0" max="24" step="0.5" />
          </div>
          <div class="field color-field">
            <div class="field-head"><label>Background</label></div>
            <input id="bgColorInput" type="color" value="#f6f4ee" />
          </div>
          <div class="upload-row">
            <label class="upload-label">
              <input id="bgUpload" type="file" accept="image/*" />
              Upload Image
            </label>
            <button id="clearBg" class="btn-tiny" disabled>Clear</button>
          </div>
          <div id="bgFileName" class="file-meta">No background image</div>
        </div>
      </section>

      <section class="group open">
        <button class="group-head" type="button">
          <span>Pattern</span>
          <span class="chev"></span>
        </button>
        <div class="group-body">
          <div class="field">
            <div class="field-head"><label>Density</label><span class="val" data-val="density"></span></div>
            <input data-key="density" type="range" min="0.15" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Line Thickness</label><span class="val" data-val="lineThickness"></span></div>
            <input data-key="lineThickness" type="range" min="2" max="90" step="0.5" />
          </div>
          <div class="field">
            <div class="field-head"><label>Width Variation</label><span class="val" data-val="widthVariation"></span></div>
            <input data-key="widthVariation" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Taper</label><span class="val" data-val="taperStrength"></span></div>
            <input data-key="taperStrength" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Smoothness</label><span class="val" data-val="curveSmoothness"></span></div>
            <input data-key="curveSmoothness" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Flourishes</label><span class="val" data-val="flourishes"></span></div>
            <input data-key="flourishes" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Node Beads</label><span class="val" data-val="nodeDots"></span></div>
            <input data-key="nodeDots" type="range" min="0" max="1" step="0.01" />
          </div>
        </div>
      </section>

      <section class="group">
        <button class="group-head" type="button">
          <span>Material</span>
          <span class="chev"></span>
        </button>
        <div class="group-body">
          <div class="field">
            <div class="field-head"><label>Material</label></div>
            <select id="fxMetalPresetInput">
              <option value="chrome">Chrome</option>
              <option value="gold">Liquid Gold</option>
              <option value="copper">Copper</option>
            </select>
          </div>
          <div class="field">
            <div class="field-head"><label>Relief Depth</label><span class="val" data-val="fxMetalRelief"></span></div>
            <input data-key="fxMetalRelief" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Light Angle</label><span class="val" data-val="fxMetalLightAngle"></span></div>
            <input data-key="fxMetalLightAngle" type="range" min="0" max="360" step="1" />
          </div>
          <div class="field">
            <div class="field-head"><label>Specular</label><span class="val" data-val="fxMetalSpec"></span></div>
            <input data-key="fxMetalSpec" type="range" min="0" max="2" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Specular Sharpness</label><span class="val" data-val="fxMetalSpecSharp"></span></div>
            <input data-key="fxMetalSpecSharp" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Iridescence</label><span class="val" data-val="fxMetalIridescence"></span></div>
            <input data-key="fxMetalIridescence" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Contact Shadow</label><span class="val" data-val="fxMetalShadow"></span></div>
            <input data-key="fxMetalShadow" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <div class="field-head"><label>Tint Amount</label><span class="val" data-val="fxMetalTintAmount"></span></div>
            <input data-key="fxMetalTintAmount" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field color-field">
            <div class="field-head"><label>Tint Color</label></div>
            <input id="fxMetalTintInput" type="color" value="#ffffff" />
          </div>
          <div class="field">
            <div class="field-head"><label>Render Quality</label><span class="val" data-val="fxMetalQuality"></span></div>
            <input data-key="fxMetalQuality" type="range" min="0.35" max="1" step="0.05" />
          </div>
        </div>
      </section>


      <section class="group">
        <button class="group-head" type="button">
          <span>Symmetry</span>
          <span class="chev"></span>
        </button>
        <div class="group-body">
          <div class="radio-stack" id="mirrorModeControls">
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="none" />
              <span>No Mirror</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="horizontal" />
              <span>Left / Right</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="vertical" />
              <span>Top / Bottom</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="quad" checked />
              <span>Quad (4-Fold)</span>
            </label>
          </div>
          <label class="switch-row">
            <input id="startFromBottomToggle" type="checkbox" checked />
            <span>Start From Bottom</span>
          </label>
          <div class="field">
            <div class="field-head"><label>Center Width</label><span class="val" data-val="textAreaW"></span></div>
            <input data-key="textAreaW" type="range" min="0" max="90" step="1" />
          </div>
          <div class="field">
            <div class="field-head"><label>Center Height</label><span class="val" data-val="textAreaH"></span></div>
            <input data-key="textAreaH" type="range" min="0" max="90" step="1" />
          </div>
        </div>
      </section>

    </aside>

    <main id="patternContainer" class="pattern">
      <canvas id="patternCanvas"></canvas>
      <div id="textAreaMarker"></div>
    </main>

    <script src="./app.js?v=ui7"></script>
  </body>
</html>
