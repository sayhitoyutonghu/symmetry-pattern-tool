<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Symmetry Pattern Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <!-- Safari Canvas ctx.filter polyfill to support blur/glow effects -->
    <script src="https://cdn.jsdelivr.net/npm/context-filter-polyfill/dist/index.min.js"></script>
  </head>
  <body class="darkmode">
    <button id="mobileToggle" class="generate-button mobile-toggle">Toggle Controls</button>

    <aside id="controls" class="stacked">
      <div id="uiControls" class="top-tabs">
        <label class="selected">
          <input type="radio" name="controlsPosition" value="stacked" checked />
          <span>Stacked</span>
        </label>
        <label>
          <input type="radio" name="controlsPosition" value="along-top" />
          <span>Along Top</span>
        </label>
        <label>
          <input type="radio" name="controlsPosition" value="hideControls" />
          <span>Hidden</span>
        </label>
      </div>

      <div id="controlBlocksContainer">
        <section class="control-block">
          <div class="control-title">
            <p>Canvas</p>
          </div>
          <div class="canvas-buttons" id="canvasPresets">
            <button data-size="full" class="canvas-size-button">
              <span class="size-icon full"></span>
              <span>Full</span>
            </button>
            <button data-size="9x16" class="canvas-size-button">
              <span class="size-icon tall"></span>
              <span>9x16</span>
            </button>
            <button data-size="4x5" class="canvas-size-button">
              <span class="size-icon portrait"></span>
              <span>4x5</span>
            </button>
            <button data-size="16x9" class="canvas-size-button">
              <span class="size-icon wide"></span>
              <span>16x9</span>
            </button>
          </div>
          <div class="half-grid">
            <div class="field">
              <label>Canvas Width</label>
              <input data-key="canvasWidth" type="range" min="300" max="4000" step="1" />
              <input data-key="canvasWidth" class="value-input" type="number" />
            </div>
            <div class="field">
              <label>Canvas Height</label>
              <input data-key="canvasHeight" type="range" min="300" max="4000" step="1" />
              <input data-key="canvasHeight" class="value-input" type="number" />
            </div>
          </div>
          <div class="field">
            <label>Pattern Padding</label>
            <input data-key="canvasPadding" type="range" min="0" max="24" step="0.5" value="0" />
          </div>
          <div class="bg-upload-row">
            <label class="upload-label image-upload-label">
              <input id="bgUpload" type="file" accept="image/*" />
              Upload Background
            </label>
            <button id="clearBg" class="tiny-button" disabled>Clear</button>
          </div>
          <div id="bgFileName" class="file-meta">No background image</div>
          <label class="switch-row style-switch-row">
            <input id="startFromBottomToggle" type="checkbox" checked />
            <span>Start Pattern From Bottom</span>
          </label>
        </section>

        <section class="control-block">
          <div class="control-title">
            <p>Central Space</p>
          </div>
          <div class="field">
            <label>Text Area Width <span id="textAreaWValue"></span></label>
            <input data-key="textAreaW" type="range" min="0" max="90" step="1" />
          </div>
          <div class="field">
            <label>Text Area Height <span id="textAreaHValue"></span></label>
            <input data-key="textAreaH" type="range" min="0" max="90" step="1" />
          </div>
        </section>

        <section class="control-block">
          <div class="control-title">
            <p>Logo</p>
          </div>
          <div class="bg-upload-row">
            <label class="upload-label image-upload-label">
              <input id="logoUpload" type="file" accept="image/*" />
              Upload Logo
            </label>
            <button id="clearLogo" class="tiny-button" disabled>Clear</button>
          </div>
          <div id="logoFileName" class="file-meta">No logo image</div>
          <div class="field">
            <label>Logo X (Center %)</label>
            <input data-key="logoX" type="range" min="5" max="95" step="1" />
          </div>
          <div class="field">
            <label>Logo Y (Center %)</label>
            <input data-key="logoY" type="range" min="5" max="95" step="1" />
          </div>
          <div class="field">
            <label>Logo Width %</label>
            <input data-key="logoW" type="range" min="5" max="70" step="1" />
          </div>
          <div class="field">
            <label>Logo Height %</label>
            <input data-key="logoH" type="range" min="5" max="70" step="1" />
          </div>
          <div class="field">
            <label>Logo Opacity</label>
            <input data-key="logoOpacity" type="range" min="0" max="1" step="0.01" />
          </div>
        </section>


        <section class="control-block">
          <div class="control-title">
            <p>Mirror</p>
          </div>
          <div class="radio-stack" id="mirrorModeControls">
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="none" />
              <span>No Mirror (Single Side)</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="horizontal" />
              <span>Left / Right Mirror</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="vertical" />
              <span>Top / Bottom Mirror</span>
            </label>
            <label class="radio-pill">
              <input type="radio" name="mirrorMode" value="quad" checked />
              <span>Quad (4-Fold Symmetry)</span>
            </label>
          </div>
        </section>

        <section id="motionControls" class="control-block closed">
          <div class="control-title always-visible">
            <p>Motion</p>
            <label class="switch-row">
              <input id="animateToggle" type="checkbox" />
              <span>Replay</span>
            </label>
          </div>
          <div class="inner-radio"><span>Styles</span></div>
          <div class="field">
            <label>Replay Hold</label>
            <input data-key="visibleTime" type="range" min="0.2" max="3" step="0.05" />
          </div>
          <div class="field">
            <label>Animation Speed</label>
            <input data-key="speed" type="range" min="0.002" max="0.08" step="0.001" />
          </div>
        </section>

        <section class="control-block">
          <div class="control-title">
            <p>Audio</p>
            <div class="audio-meter">
              <span class="audio-icon"></span>
              <span id="audioLevel">0.00</span>
            </div>
          </div>
          <div class="inner-radio"><span>Input</span></div>
          <button id="demoAudio" class="play-btn">Demo Audio</button>
          <label class="upload-label">
            <input id="audioUpload" type="file" accept="audio/*" />
            Upload Audio
          </label>
          <button id="playUploaded" class="play-btn" disabled>Uploaded Audio</button>
        </section>

        <section class="control-block">
          <div class="control-title">
            <p>Style</p>
          </div>
          <div class="color-label-row">
            <span>Color</span>
            <span id="selectedColorTag">WHITE OUTLINES</span>
          </div>
          <div id="colorControls" class="color-controls">
            <label class="color-option">
              <input type="radio" name="colorChoice" value="black" checked />
              <span class="swatch black"></span>
            </label>
            <label class="color-option">
              <input type="radio" name="colorChoice" value="black outlines" />
              <span class="swatch outline-black"></span>
            </label>
            <label class="color-option">
              <input type="radio" name="colorChoice" value="white" />
              <span class="swatch white"></span>
            </label>
            <label class="color-option">
              <input type="radio" name="colorChoice" value="white outlines" />
              <span class="swatch outline-white"></span>
            </label>
          </div>
          <div class="field">
            <label>Canvas Fill Color</label>
            <input id="bgColorInput" type="color" value="#f6f4ee" />
          </div>
          <label class="switch-row style-switch-row">
            <input id="bgGradientToggle" type="checkbox" />
            <span>Gradient Background</span>
          </label>
          <div class="field">
            <label>Gradient End Color</label>
            <input id="bgColor2Input" type="color" value="#e7e2d6" />
          </div>
          <div class="field">
            <label>Canvas Fill Alpha <span id="bgAlphaValue">1.00</span></label>
            <input id="bgAlphaInput" type="range" min="0" max="1" step="0.01" value="1" />
          </div>
          <div class="field">
            <label>Stroke Color</label>
            <input id="strokeColorInput" type="color" value="#050505" />
          </div>
          <div class="field">
            <label>Stroke Alpha <span id="strokeAlphaValue">1.00</span></label>
            <input id="strokeAlphaInput" type="range" min="0" max="1" step="0.01" value="1" />
          </div>
          <label class="switch-row style-switch-row">
            <input id="outlineToggle" type="checkbox" />
            <span>Outline Stroke</span>
          </label>
          <div class="field">
            <label>Outline Color</label>
            <input id="outlineColorInput" type="color" value="#f8f8f6" />
          </div>
          <div class="field">
            <label>Outline Alpha <span id="outlineAlphaValue">1.00</span></label>
            <input id="outlineAlphaInput" type="range" min="0" max="1" step="0.01" value="1" />
          </div>
          <div class="field">
            <label>Density</label>
            <input data-key="density" type="range" min="0.15" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Straight Lines</label>
            <input data-key="straightLines" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Flourishes</label>
            <input data-key="flourishes" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Blank Areas</label>
            <input data-key="blankAreas" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Line Thickness</label>
            <input data-key="lineThickness" type="range" min="2" max="90" step="0.5" />
          </div>
          <div class="field">
            <label>Width Variation</label>
            <input data-key="widthVariation" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Taper Strength</label>
            <input data-key="taperStrength" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Sharp Tips (Flame / Leaf)</label>
            <input data-key="sharpTips" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Curve Smoothness</label>
            <input data-key="curveSmoothness" type="range" min="0" max="1" step="0.01" />
          </div>
        </section>

        <section class="control-block">
          <div class="control-title">
            <p>Metal / 3D Material</p>
          </div>
          <label class="switch-row style-switch-row">
            <input id="fxMetalToggle" type="checkbox" />
            <span>Metal Material</span>
          </label>
          <div class="field">
            <label>Material</label>
            <select id="fxMetalPresetInput">
              <option value="chrome">Chrome</option>
              <option value="silver">Silver Filigree</option>
              <option value="gold">Liquid Gold</option>
              <option value="copper">Copper</option>
            </select>
          </div>
          <div class="field">
            <label>Relief Depth</label>
            <input data-key="fxMetalRelief" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Light Angle</label>
            <input data-key="fxMetalLightAngle" type="range" min="0" max="360" step="1" />
          </div>
          <div class="field">
            <label>Specular</label>
            <input data-key="fxMetalSpec" type="range" min="0" max="2" step="0.01" />
          </div>
          <div class="field">
            <label>Specular Sharpness</label>
            <input data-key="fxMetalSpecSharp" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Iridescence</label>
            <input data-key="fxMetalIridescence" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Contact Shadow</label>
            <input data-key="fxMetalShadow" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Tint Amount</label>
            <input data-key="fxMetalTintAmount" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Tint Color</label>
            <input id="fxMetalTintInput" type="color" value="#ffffff" />
          </div>
          <div class="field">
            <label>Render Quality</label>
            <input data-key="fxMetalQuality" type="range" min="0.35" max="1" step="0.05" />
          </div>
        </section>

        <section class="control-block">
          <div class="control-title">
            <p>Illustration FX</p>
          </div>
          <label class="switch-row style-switch-row">
            <input id="fxBubbleToggle" type="checkbox" />
            <span>Bubble / Blur</span>
          </label>
          <div class="field">
            <label>Bubble Strength</label>
            <input data-key="fxBubbleStrength" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Bubble Blur Density</label>
            <input data-key="fxBubbleBlurDensity" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Bubble Outline Width</label>
            <input data-key="fxBubbleOutlinePx" type="range" min="0" max="14" step="0.5" />
          </div>
          <div class="field">
            <label>Bubble Grain (film texture)</label>
            <input data-key="fxBubbleGrain" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Pattern Color</label>
            <input id="fxPatternColorInput" type="color" value="#111111" />
          </div>
          <div class="field">
            <label>Bubble Blur Color</label>
            <input id="fxBubbleColorInput" type="color" value="#ff0000" />
          </div>
          <label class="switch-row style-switch-row">
            <input id="fxGlassToggle" type="checkbox" />
            <span>Glass Polish / Transparency</span>
          </label>
          <div class="field">
            <label>Glass Opacity</label>
            <input data-key="fxGlassOpacity" type="range" min="0" max="1" step="0.01" />
          </div>
          <div class="field">
            <label>Glass Shine</label>
            <input data-key="fxGlassShine" type="range" min="0" max="1" step="0.01" />
          </div>
        </section>

        <section class="control-block actions">
          <div class="main-button">
            <button id="generateButton" class="generate-button">Generate</button>
            <button id="downloadButton" class="download-button" title="Download PNG">↓</button>
          </div>
        </section>
      </div>
    </aside>

    <main id="patternContainer" class="pattern padded">
      <canvas id="patternCanvas"></canvas>
      <div id="textAreaMarker"></div>
      <div id="logoPlaceholderMarker"></div>
    </main>

    <script src="./app.js?v=fluid1"></script>
  </body>
</html>
